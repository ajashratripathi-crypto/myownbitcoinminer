[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

board_build.flash_mode = dio
board_build.f_flash = 40000000L
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI
    bblanchon/ArduinoJson
    tzapu/WiFiManager

build_flags =
    -D USER_SETUP_LOADED
    -D ILI9341_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=40000000
