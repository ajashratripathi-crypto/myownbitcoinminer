name: Build CYD Bitcoin Miner

on:
  workflow_dispatch:

  push:
    branches:
      - main

    paths:
      - "CYD-Bitcoin-Miner/src/**"
      - "CYD-Bitcoin-Miner/platformio.ini"
      - "CYD-Bitcoin-Miner/installer/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CYD-Bitcoin-Miner

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Install PlatformIO and esptool
        run: |
          python -m pip install --upgrade platformio esptool

      - name: Compile CYD firmware
        run: |
          pio run -e cyd

      - name: Locate boot application
        id: bootapp
        shell: bash
        run: |
          BOOT_APP="$(find "$HOME/.platformio" -name boot_app0.bin | head -n 1)"

          if [ -z "$BOOT_APP" ]; then
            echo "boot_app0.bin was not found"
            exit 1
          fi

          echo "path=$BOOT_APP" >> "$GITHUB_OUTPUT"
          echo "Boot application: $BOOT_APP"

      - name: Create one complete flashable BIN
        shell: bash
        run: |
          python -m esptool \
            --chip esp32 \
            merge-bin \
            -o CYD_Bitcoin_Miner_Complete.bin \
            --flash-mode dio \
            --flash-size 4MB \
            0x1000 .pio/build/cyd/bootloader.bin \
            0x8000 .pio/build/cyd/partitions.bin \
            0xe000 "${{ steps.bootapp.outputs.path }}" \
            0x10000 .pio/build/cyd/firmware.bin

      - name: Copy BIN into ESP Web Tools website
        shell: bash
        run: |
          mkdir -p installer/firmware

          cp CYD_Bitcoin_Miner_Complete.bin \
            installer/firmware/CYD_Bitcoin_Miner_Complete.bin

      - name: Upload downloadable firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: CYD-Bitcoin-Miner-Firmware
          path: CYD-Bitcoin-Miner/CYD_Bitcoin_Miner_Complete.bin
          if-no-files-found: error

      - name: Save firmware to repository
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            CYD-Bitcoin-Miner/installer/firmware/CYD_Bitcoin_Miner_Complete.bin

          if git diff --cached --quiet; then
            echo "Firmware is already current."
          else
            git commit -m "Update CYD firmware [skip ci]"
            git push
          fi
